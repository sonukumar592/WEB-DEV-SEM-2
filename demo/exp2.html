<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TechStore</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body{
    height: 100%;
}

body{
    background-color: #f5f5f5;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
}

/* Navbar */

.navbar{
    background-color: #1d2127;
    padding: 15px 40px;
}

.navbar-brand{
    color: white !important;
    font-size: 28px;
    font-weight: bold;
}

.nav-link{
    color: white !important;
    margin-left: 20px;
    font-size: 18px;
}

/* Product Section */

.products-section{
    padding: 60px 40px;
    flex: 1;
}

.card{
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    padding: 15px;
}

.card img{
    height: 250px;
    width: 100%;
    object-fit: cover;
}

.card-title{
    font-size: 34px;
    font-weight: bold;
    margin-top: 10px;
}

.card-text{
    font-size: 22px;
    color: #555;
}

.price{
    font-size: 28px;
    font-weight: bold;
}

.badge{
    font-size: 14px;
    padding: 8px 10px;
    vertical-align: middle;
}

.btn{
    margin-top: 15px;
    font-size: 20px;
    padding: 10px 20px;
}

/* Footer */

.footer{
    background-color: #1d2127;
    color: white;
    text-align: center;
    padding: 18px;
    font-size: 20px;
    width: 100%;
    margin-top: auto;
}

    
  </style>
</head>

<body>

  <!-- Navbar -->

  <nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

      <a class="navbar-brand" href="#">TechStore</a>

      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link" href="#">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Products</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- Products -->

  <section class="products-section">

    <div class="container">

      <div class="row g-4">

        <!-- Product 1 -->

        <div class="col-md-4">

          <div class="card h-100">

            <img src="https://png.pngtree.com/png-vector/20250304/ourmid/pngtree-sleek-modern-laptop-with-high-resolution-display-png-image_15711292.png" class="card-img-top" alt="Laptop">
            <div class="card-body">

              <h5 class="card-title">Laptop</h5>

              <p class="card-text">
                High performance laptop
              </p>

              <p class="price">
                ₹50,000
                <span class="badge bg-success">New</span>
              </p>

              <a href="#" class="btn btn-primary">
                View Details
              </a>

            </div>

          </div>

        </div>

        <!-- Product 2 -->

        <div class="col-md-4">

          <div class="card h-100">

            <img src="https://cdn.pixabay.com/photo/2016/11/29/12/30/phone-1869510_1280.jpg" class="card-img-top" alt="Mobile">

            <div class="card-body">

              <h5 class="card-title">Mobile</h5>

              <p class="card-text">
                Latest smartphone
              </p>

              <p class="price">
                ₹30,000
                <span class="badge bg-danger">Sale</span>
              </p>

              <a href="#" class="btn btn-primary">
                View Details
              </a>

            </div>

          </div>

        </div>

        <!-- Product 3 -->

        <div class="col-md-4">

          <div class="card h-100">

            <img src="https://cdn.pixabay.com/photo/2016/11/29/09/08/headphones-1868612_1280.jpg" class="card-img-top" alt="Headphones">

            <div class="card-body">

              <h5 class="card-title">Headphones</h5>

              <p class="card-text">
                Noise cancelling
              </p>

              <p class="price">
                ₹5,000
                <span class="badge bg-success">New</span>
              </p>

              <a href="#" class="btn btn-primary">
                View Details
              </a>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->

  <footer class="footer">
    © 2026 TechStore | Follow us on social media
    <H5>Sonu kumar 2025b15410267</H5>
  </footer>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
